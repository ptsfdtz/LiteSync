version: 1
app:
  language: zh-CN
  run_mode: tray
  log_level: info
  log_dir: ""
  state_dir: ""
  startup:
    enabled: true

jobs:
  - id: job-docs
    enabled: true
    source_dir: "D:/Work/docs"
    target_dir: "E:/Backup/docs"
    exclude:
      - ".git/**"
      - "*.tmp"
      - "~$*"
    strategy:
      mode: mirror
      initial_sync: full
      event_sync:
        debounce_ms: 1500
      periodic_reconcile:
        enabled: true
        interval_minutes: 30
      delete_policy: propagate
      conflict_policy: backup_then_overwrite
      follow_symlinks: false
      preserve_permissions: true
