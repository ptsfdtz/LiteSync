services:
  litesync:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    image: litesync:local
    environment:
      LITESYNC_HTTP_ADDR: ":8080"
      LITESYNC_DATA_DIR: /data
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

