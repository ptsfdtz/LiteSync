name: Release

on:
  push:
    branches:
      - release
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      asset_version: ${{ steps.meta.outputs.asset_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          base_version=$(grep -m1 '"version"' client/package.json | sed -E 's/.*"version": "([^"]+)".*/\1/')
          short_sha="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            version="${release_tag}"
            prerelease="false"
          else
            stamp=$(date -u +%Y%m%d%H%M)
            version="${base_version}-beta.${stamp}-${short_sha}"
            release_tag="beta-${stamp}-${short_sha}"
            prerelease="true"
          fi

          asset_version=$(echo "${version}" | sed -E 's/[^0-9A-Za-z._-]+/-/g')
          release_name="LiteSync ${version}"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "asset_version=${asset_version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

  build-binaries:
    needs: metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
            ext: ""
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            suffix: macos-amd64
            ext: ""
    env:
      APP_NAME: litesync

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Setup pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9.0.6 --activate

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install frontend dependencies
        shell: pwsh
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        shell: pwsh
        working-directory: client
        run: pnpm --filter web build

      - name: Embed frontend assets
        shell: pwsh
        run: |
          $embeddedDir = "server/internal/webui/dist"
          $clientDist = "client/apps/web/dist"

          if (!(Test-Path $clientDist)) {
            throw "Frontend dist not found: $clientDist"
          }

          if (Test-Path $embeddedDir) {
            Remove-Item -Recurse -Force $embeddedDir
          }

          New-Item -ItemType Directory -Force -Path $embeddedDir | Out-Null
          Copy-Item -Recurse -Force "$clientDist/*" $embeddedDir

      - name: Build binary
        id: build
        shell: pwsh
        working-directory: server
        run: |
          $assetName = "${{ env.APP_NAME }}-${{ needs.metadata.outputs.asset_version }}-${{ matrix.suffix }}${{ matrix.ext }}"
          $assetPath = Join-Path $env:GITHUB_WORKSPACE "release/$assetName"

          New-Item -ItemType Directory -Force -Path (Split-Path $assetPath -Parent) | Out-Null

          go mod download

          $env:GOOS = "${{ matrix.goos }}"
          $env:GOARCH = "${{ matrix.goarch }}"
          $env:CGO_ENABLED = "0"

          if ("${{ matrix.goos }}" -eq "windows") {
            go build -ldflags "-H=windowsgui" -o $assetPath ./cmd/litesync-server
          } else {
            go build -o $assetPath ./cmd/litesync-server
          }

          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.asset_name }}
          path: release/${{ steps.build.outputs.asset_name }}
          if-no-files-found: error

  publish-release:
    needs:
      - metadata
      - build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.metadata.outputs.release_tag }}"
          name="${{ needs.metadata.outputs.release_name }}"
          prerelease="${{ needs.metadata.outputs.prerelease }}"
          repo="${{ github.repository }}"

          notes_file="${RUNNER_TEMP}/release-notes.md"
          cat > "${notes_file}" <<EOF
          Auto build from ${GITHUB_REF_NAME} at commit ${GITHUB_SHA}.
          Version: ${{ needs.metadata.outputs.version }}
          EOF

          if gh release view "${tag}" --repo "${repo}" >/dev/null 2>&1; then
            gh release upload "${tag}" release/* --clobber --repo "${repo}"
            edit_args=(release edit "${tag}" --title "${name}" --notes-file "${notes_file}" --repo "${repo}")
            if [[ "${prerelease}" == "true" ]]; then
              edit_args+=(--prerelease)
            fi
            gh "${edit_args[@]}"
          else
            create_args=(release create "${tag}" release/* --title "${name}" --notes-file "${notes_file}" --repo "${repo}")
            if [[ "${prerelease}" == "true" ]]; then
              create_args+=(--prerelease --target "${GITHUB_SHA}")
            fi
            gh "${create_args[@]}"
          fi
