name: Docker

on:
  push:
    branches:
      - release
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          base_version=$(grep -m1 '"version"' client/package.json | sed -E 's/.*"version": "([^"]+)".*/\1/')
          short_sha="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
            prerelease="false"
          else
            stamp=$(date -u +%Y%m%d%H%M)
            version="${base_version}-beta.${stamp}-${short_sha}"
            prerelease="true"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

  build-and-push:
    needs: metadata
    runs-on: ubuntu-latest
    env:
      APP_NAME: litesync

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker builder
        shell: bash
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install all
          docker buildx create --name litesync-builder --use
          docker buildx inspect --bootstrap

      - name: Login to GHCR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GH_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${owner}/${{ env.APP_NAME }}"
          version="${{ needs.metadata.outputs.version }}"
          clean_version="${version#v}"

          tags="${image}:${version}"
          if [[ "${{ needs.metadata.outputs.prerelease }}" == "true" ]]; then
            tags="${tags}"$'\n'"${image}:beta"
          else
            tags="${tags}"$'\n'"${image}:${clean_version}"
            tags="${tags}"$'\n'"${image}:latest"
          fi

          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        shell: bash
        run: |
          mapfile -t tags < <(printf '%s\n' "${{ steps.tags.outputs.tags }}" | sed '/^$/d')
          if [[ ${#tags[@]} -eq 0 ]]; then
            echo "No tags resolved."
            exit 1
          fi

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(-t "${tag}")
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file ./Dockerfile \
            --build-arg VITE_API_BASE_URL=/api \
            --push \
            "${tag_args[@]}" \
            .
